<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>
    {% if lang == 'uz' %}Testchi AI | Professional
    {% elif lang == 'uz_cyrl' %}Тестчи АИ | Профессионал
    {% else %}Testchi AI | Профессионал{% endif %}
  </title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #131314; 
      --card: rgba(30, 31, 34, 0.7); 
      --text: #e3e3e3;
      --muted: #9aa0a6; 
      --accent: #10a37f; 
      --accent-hover: #1a7f64;
      --sidebar-bg: #171717; 
      --border: rgba(255, 255, 255, 0.08);
      font-family: 'Inter', system-ui, sans-serif;
    }
    
    * { box-sizing: border-box; }
    body { margin: 0; height: 100vh; display: flex; color: var(--text); background: var(--bg); overflow: hidden; letter-spacing: 0.2px;}

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

    .sidebar { width: 280px; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 100;}
    .sidebar-header { padding: 20px; display: flex; align-items: center; justify-content: space-between; gap: 10px;}
    
    .new-chat-btn { flex: 1; padding: 12px 16px; background: transparent; border: 1px solid var(--border); color: var(--text); border-radius: 12px; font-weight: 500; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: flex-start; gap: 12px; transition: all 0.2s ease;}
    .new-chat-btn:hover { background: rgba(255,255,255,0.05); transform: translateY(-1px); }
    .new-chat-icon { background: var(--accent); border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; color: white; font-size: 16px; font-weight: bold;}

    .session-list { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 4px; list-style: none; margin: 0; }
    .session-item { padding: 12px 15px; border-radius: 10px; cursor: pointer; font-size: 14px; color: var(--muted); transition: 0.2s; display: flex; justify-content: space-between; align-items: center; gap: 8px;}
    .session-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
    .session-item.active { background: rgba(16, 163, 127, 0.1); color: var(--accent); font-weight: 500;}
    .session-title-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }

    .del-session-btn { opacity: 0; transition: 0.2s; cursor: pointer; font-size: 14px; padding: 4px;}
    .session-item:hover .del-session-btn { opacity: 0.7; }
    .del-session-btn:hover { opacity: 1 !important; color: #ff4a4a; }

    .back-btn { padding: 20px; text-align: center; border-top: 1px solid var(--border); display: block; color: var(--muted); text-decoration: none; font-size: 14px; transition: 0.2s;}
    .back-btn:hover { color: var(--text); background: rgba(255,255,255,0.02);}

    .main-chat { flex: 1; display: flex; flex-direction: column; position: relative; }
    
    .top-navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; position: absolute; top: 0; width: 100%; z-index: 10; background: linear-gradient(to bottom, var(--bg) 50%, transparent); }
    .menu-toggle { display: none; background: transparent; border: none; color: var(--text); font-size: 24px; cursor: pointer; padding: 0;}
    
    .lang-btns { display: flex; gap: 8px; background: rgba(255,255,255,0.05); padding: 5px; border-radius: 12px; backdrop-filter: blur(10px); border: 1px solid var(--border);}
    .lang-btn { background: none; border: none; color: var(--text); font-size: 16px; cursor: pointer; padding: 5px; border-radius: 8px; opacity: 0.5; transition: 0.2s;}
    .lang-btn.active { opacity: 1; background: rgba(255,255,255,0.1); }
    .lang-btn:hover:not(.active) { opacity: 0.8; }

    .chat-container { flex: 1; padding: 80px 20px 20px 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 30px; max-width: 900px; margin: 0 auto; width: 100%; scroll-behavior: smooth;}

    .message-wrapper { display: flex; width: 100%; gap: 15px; }
    .wrap-user { justify-content: flex-end; }
    .msg-user { background: rgba(255,255,255,0.08); padding: 14px 20px; border-radius: 20px 20px 4px 20px; font-size: 15px; line-height: 1.6; max-width: 75%; }
    
    .wrap-bot { justify-content: flex-start; }
    .bot-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; box-shadow: 0 0 15px rgba(16, 163, 127, 0.3);}
    .msg-bot { padding: 5px 0; font-size: 15px; line-height: 1.7; max-width: 85%; color: #d1d5db; }
    .msg-bot b, .msg-bot strong { color: #fff; }

    .actions { font-size: 12px; margin-top: 8px; display: flex; gap: 15px; opacity: 0; transition: 0.3s; justify-content: flex-end;}
    .wrap-user:hover .actions { opacity: 0.6; }
    .actions span { cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 4px;}
    .actions span:hover { color: #fff; opacity: 1;}

    .input-area { padding: 20px; background: linear-gradient(to top, var(--bg) 70%, transparent); display: flex; justify-content: center; }
    .input-box { max-width: 850px; width: 100%; display: flex; gap: 12px; align-items: flex-end; background: #2f2f2f; border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 8px 12px 8px 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); transition: 0.3s;}
    .input-box:focus-within { border-color: rgba(255,255,255,0.3); background: #333333; }
    
    textarea { flex: 1; background: transparent; border: none; padding: 10px 0; color: #fff; font-size: 15px; resize: none; outline: none; max-height: 200px; font-family: inherit; line-height: 1.5;}
    textarea::placeholder { color: #8e8e8e; }
    
    .send-btn { background: var(--text); color: var(--bg); border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; font-size: 18px;}
    .send-btn:hover { background: #fff; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(255,255,255,0.2); }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; box-shadow: none;}

    /* Gemini Thinking */
    .gemini-thinking-wrapper { display: flex; gap: 12px; width: 100%; align-items: center; padding: 10px 0; animation: fadeIn 0.4s ease; }
    .gemini-icon-container { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; position: relative; flex-shrink: 0; }
    .gemini-star { width: 18px; height: 18px; animation: pulse-glow 1.2s infinite alternate; }
    .gemini-spinner { position: absolute; width: 28px; height: 28px; border: 2px solid rgba(123, 163, 255, 0.15); border-top-color: #7ba3ff; border-radius: 50%; animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
    .gemini-thinking-text-container { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.05); padding: 8px 16px; border-radius: 20px; cursor: default; }
    .gemini-thinking-text { color: #e3e3e3; font-size: 14.5px; font-weight: 500; animation: fadeInOut 0.5s ease; }
    .chevron-down { color: #9aa0a6; width: 14px; height: 14px;}

    @keyframes pulse-glow { 0% { transform: scale(0.9); filter: drop-shadow(0 0 2px rgba(123, 163, 255, 0.4)); opacity: 0.7;} 100% { transform: scale(1.1); filter: drop-shadow(0 0 8px rgba(123, 163, 255, 0.9)); opacity: 1;} }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeInOut { 0% {opacity: 0.5; transform: scale(0.98);} 100% {opacity: 1; transform: scale(1);} }
    .cursor-blink { display: inline-block; width: 6px; height: 15px; background-color: var(--text); margin-left: 2px; animation: blink 1s step-end infinite; vertical-align: middle;}
    @keyframes blink { 50% { opacity: 0; } }

    @media (max-width: 768px) {
      .sidebar { position: absolute; height: 100%; transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); box-shadow: 10px 0 30px rgba(0,0,0,0.8); }
      .menu-toggle { display: block; }
      .chat-container { padding-top: 70px; }
      .msg-user { max-width: 90%; }
      .msg-bot { max-width: 95%; }
    }
  </style>
</head>
<body style="{% if current_user_bg %}background: linear-gradient(rgba(19, 19, 20, 0.85), rgba(19, 19, 20, 0.95)), url('{{ current_user_bg }}') no-repeat center center fixed; background-size: cover;{% endif %}">

  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <button class="new-chat-btn" onclick="startNewChat()">
        <div class="new-chat-icon">+</div>
        {% if lang == 'uz' %}Yangi Chat{% elif lang == 'uz_cyrl' %}Янги Чат{% else %}Новый чат{% endif %}
      </button>
    </div>
    <ul class="session-list" id="sessionList"></ul>
    <a href="/?token={{ token }}" class="back-btn">⬅️ {% if lang == 'uz' %}Kabinetga qaytish{% elif lang == 'uz_cyrl' %}Кабинетга қайтиш{% else %}Вернуться в кабинет{% endif %}</a>
  </div>

  <div class="main-chat">
    <div class="top-navbar">
      <div style="display: flex; align-items: center; gap: 15px;">
        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
        <span style="font-weight: 600; color: #fff; font-size: 16px; display: flex; align-items: center; gap: 8px;">
          <span style="color: var(--accent);">✦</span> Testchi AI
        </span>
      </div>
      <div class="lang-btns">
        <form action="/set-lang" method="POST" style="margin: 0;">
            <input type="hidden" name="token" value="{{ token }}">
            <input type="hidden" name="lang" value="uz">
            <button type="submit" class="lang-btn {% if lang == 'uz' %}active{% endif %}" title="O'zbek tili">🇺🇿</button>
        </form>
        <form action="/set-lang" method="POST" style="margin: 0;">
            <input type="hidden" name="token" value="{{ token }}">
            <input type="hidden" name="lang" value="uz_cyrl">
            <button type="submit" class="lang-btn {% if lang == 'uz_cyrl' %}active{% endif %}" title="Ўзбек тили">Кр</button>
        </form>
        <form action="/set-lang" method="POST" style="margin: 0;">
            <input type="hidden" name="token" value="{{ token }}">
            <input type="hidden" name="lang" value="ru">
            <button type="submit" class="lang-btn {% if lang == 'ru' %}active{% endif %}" title="Русский язык">🇷🇺</button>
        </form>
      </div>
    </div>

    <div class="chat-container" id="chatBox"></div>

    <div class="input-area">
      <div class="input-box">
        <textarea id="userInput" rows="1" placeholder="{% if lang == 'uz' %}AI ga xabar yozing...{% elif lang == 'uz_cyrl' %}АИ га хабар ёзинг...{% else %}Напишите сообщение AI...{% endif %}" oninput="autoResize(this)" onkeypress="handleEnter(event)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
      </div>
    </div>
  </div>

  <script>
    let currentSessionId = null;
    let thinkingInterval = null;
    let isSending = false; // TAKRORLANISHGA QARSHI QO'SHIMCHA BLOKIROVKA
    let renderedMessages = new Set(); // YANGLIK: Xabarlarni ikki marta chiqib ketishidan himoya!
    
    const lang = "{{ lang }}";

    const t = {
        'delete_confirm': lang === 'uz' ? "Ushbu chatni o'chirib yubormoqchimisiz?" : (lang === 'uz_cyrl' ? "Ушбу чатни ўчириб юбормоқчимисиз?" : "Удалить этот чат?"),
        'welcome_title': "Qanday yordam bera olaman?",
        'welcome_title_cyrl': "Қандай ёрдам бера оламан?",
        'welcome_title_ru': "Чем могу помочь?",
        'edit': "✏️",
        'delete': "🗑️",
        'edit_prompt': lang === 'uz' ? "Tahrirlash:" : "Редактировать:"
    };

    const welcomeTitle = lang === 'uz' ? t.welcome_title : (lang === 'uz_cyrl' ? t.welcome_title_cyrl : t.welcome_title_ru);

    window.onload = async () => {
      await loadSessions();
      startNewChat();
    };

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
    function autoResize(el) { el.style.height = 'auto'; let newHeight = el.scrollHeight; if(newHeight > 200) newHeight = 200; el.style.height = newHeight + 'px'; if(el.value === '') el.style.height = '40px'; }

    async function loadSessions() {
      const res = await fetch('/api/ai-chat/sessions?token={{ token }}');
      const sessions = await res.json();
      const list = document.getElementById('sessionList');
      list.innerHTML = '';

      sessions.forEach(s => {
        const li = document.createElement('li');
        li.className = `session-item ${s.session_id === currentSessionId ? 'active' : ''}`;

        const titleSpan = document.createElement('div');
        titleSpan.className = 'session-title-text';
        let title = s.title.length > 20 ? s.title.substring(0, 20) + '...' : s.title;
        titleSpan.innerText = title;
        titleSpan.onclick = () => { loadHistory(s.session_id); if(window.innerWidth<=768) toggleSidebar(); };

        const delBtn = document.createElement('div');
        delBtn.className = 'del-session-btn';
        delBtn.innerHTML = '✖';
        delBtn.onclick = (e) => { e.stopPropagation(); deleteSession(s.session_id); };

        li.appendChild(titleSpan);
        li.appendChild(delBtn);
        list.appendChild(li);
      });
    }

    async function deleteSession(sessionId) {
      if(confirm(t.delete_confirm)) {
        await fetch('/api/ai-chat/edit', {
          method: 'POST', headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ token: "{{ token }}", session_id: sessionId, action: "delete_session" })
        });
        if(currentSessionId === sessionId) startNewChat(); else loadSessions();
      }
    }

    function startNewChat() {
      currentSessionId = null;
      renderedMessages.clear(); // Xabarlar tarixini tozalash
      document.getElementById('chatBox').innerHTML = `<div style="text-align:center; margin-top:20vh; animation: fadeIn 0.5s ease;"><div style="font-size: 40px; margin-bottom: 15px; color: var(--accent);">✦</div><h2 style="font-size: 28px; font-weight: 500; color: #fff;">${welcomeTitle}</h2></div>`;
      document.querySelectorAll('.session-item').forEach(el => el.classList.remove('active'));
      if(window.innerWidth <= 768 && document.getElementById('sidebar').classList.contains('open')) toggleSidebar();
    }

    async function loadHistory(sessionId) {
      currentSessionId = sessionId;
      loadSessions();
      renderedMessages.clear(); // Boshqa chatga o'tganda ID larni tozalash

      const chatBox = document.getElementById('chatBox');
      chatBox.innerHTML = '';

      const res = await fetch(`/api/ai-chat/history?token={{ token }}&session_id=${sessionId}`);
      const msgs = await res.json();
      msgs.forEach(m => addMessageUI(m.id, m.content, m.role === 'user', false));
      scrollToBottom();
    }

    function addThinkingUI() {
      const chatBox = document.getElementById('chatBox');
      if(chatBox.innerHTML.includes(welcomeTitle)) chatBox.innerHTML = '';

      const wrap = document.createElement('div');
      wrap.id = 'thinkingIndicator';
      wrap.innerHTML = `
        <div class="gemini-thinking-wrapper wrap-bot">
          <div class="gemini-icon-container">
            <svg class="gemini-star" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z" fill="#7ba3ff"/></svg>
            <div class="gemini-spinner"></div>
          </div>
          <div class="gemini-thinking-text-container">
            <span class="gemini-thinking-text" id="dynamicStatusText">Sizning so'rovingiz serverga yuborilmoqda...</span>
            <svg class="chevron-down" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M6 9L12 15L18 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
        </div>
      `;
      chatBox.appendChild(wrap);
      scrollToBottom();

      const steps = ["Matn tahlil qilinmoqda...", "Internet tarmog'idan izlanmoqda...", "Ma'lumotlar jamlanmoqda...", "Javob shakllantirilmoqda..."];
      let stepIndex = 0;
      thinkingInterval = setInterval(() => {
        const textElement = document.getElementById('dynamicStatusText');
        if (textElement) {
            textElement.style.animation = 'none'; textElement.offsetHeight; 
            textElement.style.animation = 'fadeInOut 0.5s ease';
            textElement.innerText = steps[stepIndex];
            stepIndex = (stepIndex + 1) % steps.length;
        } else clearInterval(thinkingInterval);
      }, 2500); 
    }

    function removeThinkingUI() {
      const indicator = document.getElementById('thinkingIndicator');
      if (indicator) indicator.remove();
      if (thinkingInterval) clearInterval(thinkingInterval);
    }

    function addMessageUI(id, text, isUser, animate = false) {
      // MUHIM HIMOYA: Agar xabar IDsi avval chiqqan bo'lsa, ikkinchi marta chizmaydi!
      if (id) {
        if (renderedMessages.has(id)) return;
        renderedMessages.add(id);
      }

      const chatBox = document.getElementById('chatBox');
      if(chatBox.innerHTML.includes(welcomeTitle)) chatBox.innerHTML = '';

      const wrap = document.createElement('div');
      wrap.className = `message-wrapper ${isUser ? 'wrap-user' : 'wrap-bot'}`;
      if(id) wrap.id = `msg_${id}`;

      if (!isUser) {
        const avatar = document.createElement('div');
        avatar.className = 'bot-avatar';
        avatar.innerHTML = '✦';
        wrap.appendChild(avatar);
      }

      const msgContainer = document.createElement('div');
      msgContainer.style.display = 'flex';
      msgContainer.style.flexDirection = 'column';
      msgContainer.style.maxWidth = '100%';

      const msgDiv = document.createElement('div');
      msgDiv.className = `msg-${isUser ? 'user' : 'bot'}`;
      msgContainer.appendChild(msgDiv);

      if(isUser && id) {
        const actions = document.createElement('div');
        actions.className = 'actions';
        actions.innerHTML = `<span onclick="editMsg(${id}, '${text.replace(/'/g, "\\'")}')">${t.edit}</span>
                             <span style="color:#ff6b6b;" onclick="deleteMsg(${id})">${t.delete}</span>`;
        msgContainer.appendChild(actions);
      }

      wrap.appendChild(msgContainer);
      chatBox.appendChild(wrap);

      let formattedText = text.replace(/\n/g, '<br>');

      if (animate && !isUser) {
        const tokens = formattedText.match(/(<[^>]+>|&[a-zA-Z0-9#]+;|[\s\S])/g) || [];
        let i = 0; let currentHTML = "";
        msgDiv.innerHTML = '<span class="cursor-blink"></span>';

        function type() {
          if (i < tokens.length) {
            currentHTML += tokens[i];
            msgDiv.innerHTML = currentHTML + '<span class="cursor-blink"></span>';
            i++; scrollToBottom(); setTimeout(type, 10); 
          } else {
            msgDiv.innerHTML = currentHTML; scrollToBottom();
          }
        }
        type();
      } else {
        msgDiv.innerHTML = formattedText; scrollToBottom();
      }
    }

    async function sendMessage() {
      // Blokirovka: Agar oldingi xabar ketayotgan bo'lsa, qotib qolishni oldini oladi
      if (isSending) return; 

      const input = document.getElementById('userInput');
      const btn = document.getElementById('sendBtn');
      if (btn.disabled) return; 

      const text = input.value.trim();
      if (!text) return;

      isSending = true; // Jarayon boshlandi
      input.value = '';
      input.style.height = '40px';
      btn.disabled = true;

      addMessageUI(null, text, true, false);
      addThinkingUI();

      try {
        const response = await fetch('/api/ai-chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: "{{ token }}", text: text, session_id: currentSessionId })
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let buffer = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop(); 

          for (let line of lines) {
            if (!line.trim()) continue;
            try {
              const data = JSON.parse(line);

              if (data.status) {
                const statusEl = document.getElementById('dynamicStatusText');
                if (statusEl) {
                  statusEl.style.animation = 'none'; statusEl.offsetHeight; 
                  statusEl.style.animation = 'fadeInOut 0.5s ease';
                  statusEl.innerText = data.status; 
                }
              } else if (data.reply) {
                removeThinkingUI();
                btn.disabled = false;
                isSending = false; // Jarayon tugadi
                currentSessionId = data.session_id;
                addMessageUI(data.id, data.reply, false, true); 
                loadSessions();
              } else if (data.error) {
                removeThinkingUI();
                btn.disabled = false;
                isSending = false;
                addMessageUI(null, `❌ <b>Xatolik:</b><br>${data.error}`, false, false);
              }
            } catch (e) {
              console.error("Kichik json tahlil xatosi:", e);
            }
          }
        }
      } catch (err) {
        removeThinkingUI();
        btn.disabled = false;
        isSending = false;
        addMessageUI(null, `❌ Tarmoq xatosi. Iltimos qayta urinib ko'ring.`, false);
      }
      input.focus();
    }

    function handleEnter(e) { 
      if (e.key === 'Enter' && !e.shiftKey) { 
        e.preventDefault(); 
        e.stopPropagation(); // Eventni takrorlanishdan uzadi
        sendMessage(); 
      } 
    }
    function scrollToBottom() { const b = document.getElementById('chatBox'); b.scrollTop = b.scrollHeight; }
  </script>
</body>
</html>
