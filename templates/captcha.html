<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasdiqlash | Geo Ustoz</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
  <style>
    body {
      background-color: #0f172a;
      color: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .lang-switcher {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .lang-btn {
      background: #1e293b;
      border: 1px solid #334155;
      color: #94a3b8;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s;
    }
    .lang-btn.active {
      background: #38bdf8;
      color: #0f172a;
      border-color: #38bdf8;
      font-weight: bold;
    }
    .container {
      background: #1e293b;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      text-align: center;
      width: 90%;
      max-width: 350px;
      border: 1px solid #334155;
    }
    h2 { margin-top: 0; font-size: 20px; color: #38bdf8; }
    p { font-size: 14px; color: #94a3b8; margin-bottom: 20px; }

    /* RECAPTCHA UCHUN JOY */
    .g-recaptcha {
      display: flex;
      justify-content: center;
      margin-bottom: 15px;
    }

    button.verify-btn {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      border: none;
      background: #38bdf8;
      color: #0f172a;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }
    button.verify-btn:hover:not(:disabled) { background: #0ea5e9; }
    button.verify-btn:disabled { opacity: 0.7; cursor: not-allowed; }
    .error { color: #f87171; font-size: 13px; margin-bottom: 10px; display: none; }
  </style>
</head>
<body>

  <div class="lang-switcher">
    <button class="lang-btn active" onclick="setLang('uz', this)">🇺🇿 O'zbek</button>
    <button class="lang-btn" onclick="setLang('uz_cyrl', this)">🇺🇿 Ўзбек</button>
    <button class="lang-btn" onclick="setLang('ru', this)">🇷🇺 Русский</button>
  </div>

  <div class="container">
    <h2 id="titleText">🤖 Xavfsizlik tekshiruvi</h2>
    <p id="descText">Botdan foydalanish uchun quyidagi tasdiqdan o'ting.</p>

    <div class="g-recaptcha" data-sitekey="6LeNKsYsAAAAAIDTnse6SodmZMeAppFEZYD4FlXs" data-theme="dark"></div>

    <div id="errorMsg" class="error">❌ Iltimos, kapchadan o'ting!</div>

    <button id="verifyBtn" class="verify-btn" onclick="verify()">✅ Tasdiqlash</button>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const translations = {
      uz: {
        title: "🤖 Xavfsizlik tekshiruvi",
        desc: "Botdan foydalanish uchun quyidagi tasdiqdan o'ting.",
        btnVerify: "✅ Tasdiqlash",
        btnLoading: "⏳ Tekshirilmoqda...",
        btnSuccess: "✅ Tasdiqlandi!",
        errEmpty: "❌ Iltimos, kapchadan o'ting!",
        errServer: "❌ Server xatosi!"
      },
      uz_cyrl: {
        title: "🤖 Хавфсизлик текшируви",
        desc: "Ботдан фойдаланиш учун қуйидаги тасдиқдан ўтинг.",
        btnVerify: "✅ Тасдиқлаш",
        btnLoading: "⏳ Текширилмоқда...",
        btnSuccess: "✅ Тасдиқланди!",
        errEmpty: "❌ Илтимос, капчадан ўтинг!",
        errServer: "❌ Сервер хатоси!"
      },
      ru: {
        title: "🤖 Проверка безопасности",
        desc: "Пройдите проверку ниже, чтобы использовать бота.",
        btnVerify: "✅ Подтвердить",
        btnLoading: "⏳ Проверка...",
        btnSuccess: "✅ Подтверждено!",
        errEmpty: "❌ Пожалуйста, пройдите капчу!",
        errServer: "❌ Ошибка сервера!"
      }
    };

    let currentLang = 'uz';

    function setLang(lang, btnElement) {
      currentLang = lang;
      document.getElementById('titleText').innerText = translations[lang].title;
      document.getElementById('descText').innerText = translations[lang].desc;

      const verifyBtn = document.getElementById('verifyBtn');
      if(!verifyBtn.disabled) verifyBtn.innerText = translations[lang].btnVerify;

      document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
      btnElement.classList.add('active');
      document.getElementById('errorMsg').style.display = "none";
    }

    function verify() {
      const captchaResponse = grecaptcha.getResponse();
      const errorMsg = document.getElementById('errorMsg');
      const btn = document.getElementById('verifyBtn');

      if (!captchaResponse) {
        errorMsg.innerText = translations[currentLang].errEmpty;
        errorMsg.style.display = "block";
        tg.HapticFeedback.notificationOccurred('error');
        return;
      }

      errorMsg.style.display = "none";
      btn.innerText = translations[currentLang].btnLoading;
      btn.disabled = true;

      fetch('/api/verify-captcha', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
              initData: tg.initData,
              captcha_token: captchaResponse
          })
      })
      .then(res => res.json())
      .then(data => {
          if (data.success) {
              tg.HapticFeedback.notificationOccurred('success');
              btn.innerText = translations[currentLang].btnSuccess;
              btn.style.background = "#22c55e";
              setTimeout(() => tg.close(), 1000);
          } else {
              throw new Error(data.error || "Tasdiqlanmadi");
          }
      })
      .catch(err => {
          errorMsg.innerText = translations[currentLang].errServer;
          errorMsg.style.display = "block";
          btn.innerText = translations[currentLang].btnVerify;
          btn.disabled = false;
          grecaptcha.reset();
      });
    }
  </script>
</body>
</html>
