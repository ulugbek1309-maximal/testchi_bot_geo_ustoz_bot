<!DOCTYPE html>
<html lang="uz">
<head>
    <title>Loading...</title>
    <script src="https://telegram.org/js/telegram-web-app.js?v=8"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; text-align: center; margin: 0;}
        .loader { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #38d39f; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 15px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div>
        <div class="loader" id="spinner"></div>
        <h2 id="msg" style="font-size: 18px; font-weight: 500;">Yuklanmoqda...</h2>
    </div>

    <script>
        function initWebApp() {
            try {
                const tg = window.Telegram.WebApp;
                tg.ready();
                tg.expand();

                // Flask session'dan yoki Telegram sozlamasidan tilni aniqlash
                let userLang = "{{ lang }}";
                if (!userLang || userLang === "None" || userLang === "") {
                    // Agar session bo'lmasa, Telegram qaysi tilda ekanligini ko'ramiz
                    const tgLang = (tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.language_code) ? tg.initDataUnsafe.user.language_code : 'uz';
                    userLang = tgLang === 'ru' ? 'ru' : 'uz';
                }

                // 3 xil til uchun tarjimalar lug'ati
                const t = {
                    title: {
                        uz: "Testga ulanilmoqda...",
                        uz_cyrl: "Тестга уланилмоқда...",
                        ru: "Подключение к тесту..."
                    },
                    redirecting: {
                        uz: "Testga yo'naltirilmoqda...",
                        uz_cyrl: "Тестга йўналтирилмоқда...",
                        ru: "Перенаправление на тест..."
                    },
                    only_telegram: {
                        uz: "Siz testni faqat Telegram orqali yechishingiz mumkin! ❌",
                        uz_cyrl: "Сиз тестни фақат Telegram орқали ечишингиз мумкин! ❌",
                        ru: "Вы можете пройти тест только через Telegram! ❌"
                    },
                    denied: {
                        uz: "Kirish rad etildi ❌",
                        uz_cyrl: "Кириш рад этилди ❌",
                        ru: "Доступ запрещен ❌"
                    },
                    error: {
                        uz: "Server xatosi ❌",
                        uz_cyrl: "Сервер хатоси ❌",
                        ru: "Ошибка сервера ❌"
                    },
                    loading: {
                        uz: "Yuklanmoqda...",
                        uz_cyrl: "Юкланмоқда...",
                        ru: "Загрузка..."
                    }
                };

                const getText = (key) => t[key][userLang] || t[key]['uz'];

                // Dastlabki yozuvlarni tanlangan tilga o'zgartirish
                document.title = getText('title');
                document.getElementById('msg').innerHTML = getText('redirecting');

                let initData = tg.initData;
                if (!initData && window.location.hash) {
                    initData = new URLSearchParams(window.location.hash.slice(1)).get('tgWebAppData');
                }

                if (!initData) {
                    document.getElementById('spinner').style.display = 'none';
                    document.getElementById('msg').innerHTML = getText('only_telegram');
                    return;
                }

                fetch('/api/auth/webapp', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ initData: initData })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.needs_captcha) {
                        // Agar captcha kerak bo'lsa captchaga yo'naltiramiz
                        window.location.replace('/captcha');
                    } else if (data.token) {
                        // Tizimga muvaffaqiyatli kirsa, test ishlash sahifasiga yo'naltirish
                        window.location.replace('/solve/{{ test_id }}?token=' + data.token);
                    } else {
                        document.getElementById('spinner').style.display = 'none';
                        document.getElementById('msg').innerHTML = getText('denied');
                    }
                }).catch(err => {
                    document.getElementById('spinner').style.display = 'none';
                    document.getElementById('msg').innerHTML = getText('error');
                });
            } catch(e) {
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('msg').innerHTML = "Xatolik / Ошибка / Хатолик ❌";
            }
        }

        setTimeout(initWebApp, 500);
    </script>
</body>
</html>
